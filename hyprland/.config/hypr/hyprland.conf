# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

source = ~/.config/hypr/colors.conf

################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
# monitor=HDMI-A-1,preferred,0x0,1
# monitor=DVI-I-1,preferred,1920x-400,1,transform,3
# monitor=eDP-1,preferred,3000x0,1
monitor=HDMI-A-1,preferred,0x0,1
monitor=DVI-I-1,preferred,2560x-400,1,transform,3
monitor=DVI-I-2,preferred,2560x-400,1,transform,3
monitor=eDP-1,preferred,3640x0,1

###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = foot
$fileManager = dolphin
$menu = fuzzel
$browser = zen


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
# exec-once = swww-daemon
# exec-once = swww img -o eDP-1 --transition-type wipe --transition-angle 30 --transition-step 90 ~/Vídeos/wallpaper1.gif
# exec-once = swww img -o HDMI-A-1 --transition-type wipe --transition-angle 30 --transition-step 90 ~/Vídeos/wallpaper1.gif
# exec-once = swww img -o DVI-I-1 --transition-type wipe --transition-angle 30 --transition-step 90 ~/Vídeos/wallpaper_vertical.gif

exec-once = hypridle
exec-once = hyprpaper
exec-once = hyprsunset
# exec-once = swww img --transition-type wipe --transition-angle 30 --transition-step 90 ~/Imágenes/wallpaper_mountains.png
exec-once = blueman-applet
exec-once = waybar
exec-once = systemctl --user start hyprpolkitagent
exec-once = wallust run ~/.config/wallust/current


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
