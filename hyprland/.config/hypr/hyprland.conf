# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}

#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = es
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = ALT # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod SHIFT, Return, exec, $terminal
bind = $mainMod SHIFT, Q, killactive,
bind = $mainMod SHIFT, E, exec, command -v hyprshutdown >/dev/null2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod SHIFT, B, exec, $browser
bind = $mainMod SHIFT, X, exec, ~/.config/scripts/captura_de_pantalla_parcial.bash
bind = $mainMod SHIFT, M, fullscreen, 1
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod SHIFT, D, exec, $menu
bind = $mainMod, D, exec, $menu --list-executables-in-path
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod SHIFT, T, exec, blueman-manager
bind = $mainMod SHIFT, R, exec, pavucontrol
bind = $mainMod SHIFT, Y, exec, protonvpn-app
bind = $mainMod SHIFT, Z, exec, hyprlock

# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, cyclenext, r
bind = $mainMod, k, cyclenext, u
bind = $mainMod, j, movefocus, d

# Switch with master
bind = $mainMod, Return, layoutmsg, swapwithmaster

# Move left and right master panel
bind = $mainMod SHIFT, h, layoutmsg, mfact -0.025
bind = $mainMod SHIFT, l, layoutmsg, mfact +0.02

# Mover el foco entre monitores
bind = ALT, period, focusmonitor, +1
bind = ALT, comma,  focusmonitor, -1

# Mover la ventana activa entre monitores
bind = ALT SHIFT, period, movewindow, mon:+1
bind = ALT SHIFT, comma,  movewindow, mon:-1

# Ir al "1..10 local" del monitor enfocado
bind = $mainMod, 1, exec, ~/.config/hypr/ws-local.sh goto 1
bind = $mainMod, 2, exec, ~/.config/hypr/ws-local.sh goto 2
bind = $mainMod, 3, exec, ~/.config/hypr/ws-local.sh goto 3
bind = $mainMod, 4, exec, ~/.config/hypr/ws-local.sh goto 4
bind = $mainMod, 5, exec, ~/.config/hypr/ws-local.sh goto 5
bind = $mainMod, 6, exec, ~/.config/hypr/ws-local.sh goto 6
bind = $mainMod, 7, exec, ~/.config/hypr/ws-local.sh goto 7
bind = $mainMod, 8, exec, ~/.config/hypr/ws-local.sh goto 8
bind = $mainMod, 9, exec, ~/.config/hypr/ws-local.sh goto 9
bind = $mainMod, 0, exec, ~/.config/hypr/ws-local.sh goto 10

# Mover ventana al "1..10 local" del monitor enfocado
bind = $mainMod SHIFT, 1, exec, ~/.config/hypr/ws-local.sh move 1
bind = $mainMod SHIFT, 2, exec, ~/.config/hypr/ws-local.sh move 2
bind = $mainMod SHIFT, 3, exec, ~/.config/hypr/ws-local.sh move 3
bind = $mainMod SHIFT, 4, exec, ~/.config/hypr/ws-local.sh move 4
bind = $mainMod SHIFT, 5, exec, ~/.config/hypr/ws-local.sh move 5
bind = $mainMod SHIFT, 6, exec, ~/.config/hypr/ws-local.sh move 6
bind = $mainMod SHIFT, 7, exec, ~/.config/hypr/ws-local.sh move 7
bind = $mainMod SHIFT, 8, exec, ~/.config/hypr/ws-local.sh move 8
bind = $mainMod SHIFT, 9, exec, ~/.config/hypr/ws-local.sh move 9
bind = $mainMod SHIFT, 0, exec, ~/.config/hypr/ws-local.sh move 10

# Workspace para cada monitor, con 10 workspaces cada uno. 
workspace = 1,  monitor:eDP-1,    persistent:false, default:true
workspace = 2,  monitor:eDP-1,    persistent:false
workspace = 3,  monitor:eDP-1,    persistent:false
workspace = 4,  monitor:eDP-1,    persistent:false
workspace = 5,  monitor:eDP-1,    persistent:false
workspace = 6,  monitor:eDP-1,    persistent:false
workspace = 7,  monitor:eDP-1,    persistent:false
workspace = 8,  monitor:eDP-1,    persistent:false
workspace = 9,  monitor:eDP-1,    persistent:false
workspace = 10, monitor:eDP-1,    persistent:false

workspace = 11, monitor:HDMI-A-1, persistent:false, default:true
workspace = 12, monitor:HDMI-A-1, persistent:false
workspace = 13, monitor:HDMI-A-1, persistent:false
workspace = 14, monitor:HDMI-A-1, persistent:false
workspace = 15, monitor:HDMI-A-1, persistent:false
workspace = 16, monitor:HDMI-A-1, persistent:false
workspace = 17, monitor:HDMI-A-1, persistent:false
workspace = 18, monitor:HDMI-A-1, persistent:false
workspace = 19, monitor:HDMI-A-1, persistent:false
workspace = 20, monitor:HDMI-A-1, persistent:false

workspace = 21, monitor:DVI-I-1,    persistent:false, default:true
workspace = 22, monitor:DVI-I-1,    persistent:false
workspace = 23, monitor:DVI-I-1,    persistent:false
workspace = 24, monitor:DVI-I-1,    persistent:false
workspace = 25, monitor:DVI-I-1,    persistent:false
workspace = 26, monitor:DVI-I-1,    persistent:false
workspace = 27, monitor:DVI-I-1,    persistent:false
workspace = 28, monitor:DVI-I-1,    persistent:false
workspace = 29, monitor:DVI-I-1,    persistent:false
workspace = 30, monitor:DVI-I-1,    persistent:false

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

xwayland {
  force_zero_scaling = true
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}
